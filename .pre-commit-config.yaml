repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: ty
        name: ty check
        description: Type check with ty.
        entry: ty check
        language: system
        pass_filenames: false
        require_serial: true
        types: [python]

      # complexipy suspended: 30 functions exceed complexity 20 (range 21–43)
      # tracked in: https://github.com/Oaklight/llm-rosetta/issues/<TBD>
      # re-enable once refactoring is done:
      #   entry: complexipy src/llm_rosetta tests -e _vendor -mx 20
      # - id: complexipy
      #   name: complexipy (complexity check)
      #   entry: complexipy src/llm_rosetta tests -e _vendor -mx 20
      #   language: system
      #   pass_filenames: false
      #   always_run: true
